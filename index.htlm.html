// MOBILE TOUCH DRAG (fixes HTML5 drag not working on mobile)
// ══════════════════════════════════════════════════════════════
function _initTouchDrag() {
  var dragging = null, placeholder = null, startY = 0, currentY = 0;

  document.addEventListener('touchstart', function(e) {
    var handle = e.target.closest('[draggable="true"]');
    if (!handle) return;
    dragging = handle;
    startY = e.touches[0].clientY;
    dragging.style.opacity = '0.7';
    dragging.style.transform = 'scale(1.02)';
    e.preventDefault();
  }, {passive: false});

  document.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    currentY = e.touches[0].clientY;
    var delta = currentY - startY;
    dragging.style.transform = 'scale(1.02) translateY('+delta+'px)';
    e.preventDefault();
  }, {passive: false});

  document.addEventListener('touchend', function(e) {
    if (!dragging) return;
    // Find target element at touch position
    dragging.style.opacity = '1';
    dragging.style.transform = '';
    var touch = e.changedTouches[0];
    var target = document.elementFromPoint(touch.clientX, touch.clientY);
    var targetBlock = target ? target.closest('[draggable="true"]') : null;
    if (targetBlock && targetBlock !== dragging) {
      // Get indices from id
      var fromId = dragging.id.replace('rb-block-','');
      var toId = targetBlock.id.replace('rb-block-','');
      if (fromId !== toId && !isNaN(+fromId) && !isNaN(+toId)) {
        rbDrop(+toId);
        RB_DRAG.idx = +fromId;
        rbDrop(+toId);
      }
    }
    dragging = null;
    RB_DRAG.idx = null; RB_DRAG.over = null;
  });
}

// Draft session persistence — save on page hide/close
function _draftSessionToLocalStorage() {
  if (!STATE.session || !STATE.session.length) return;
  try {
    localStorage.setItem('vitawell-draft-session', JSON.stringify({
      session: STATE.session,
      date: STATE.date,
      savedAt: new Date().toISOString()
    }));
  } catch(e) {}
}

function _restoreDraftSession() {
  try {
    var draft = JSON.parse(localStorage.getItem('vitawell-draft-session') || 'null');
    if (!draft || !draft.session || !draft.session.length) return;
    // Only restore if draft is from today
    var draftDate = (draft.savedAt || '').slice(0,10);
    var today = new Date().toISOString().slice(0,10);
    if (draftDate !== today) { localStorage.removeItem('vitawell-draft-session'); return; }
    if (confirm('Tienes una sesión sin guardar de hoy (' + draft.session.length + ' ejercicios). ¿Recuperarla?')) {
      STATE.session = draft.session;
      STATE.date = draft.date || today;
      localStorage.removeItem('vitawell-draft-session');
      toast('Sesión recuperada 💾');
    } else {
      localStorage.removeItem('vitawell-draft-session');
    }
  } catch(e) {}
}

// Save draft on page visibility change (phone locks, app switches)
document.addEventListener('visibilitychange', function() {
  if (document.hidden && STATE.session && STATE.session.length > 0) {
    _draftSessionToLocalStorage();
  }
});

// Save draft before page unloads
window.addEventListener('beforeunload', function(e) {
  if (STATE.session && STATE.session.length > 0 && !STATE.saving) {
    _draftSessionToLocalStorage();
  }
});

// ── Si se abre como archivo local, ir directo a login ──────────────
if (window.location.protocol === 'file:') {
  setTimeout(function() { set({view:'auth'}); }, 100);
} else {
  // ── Detectar si viene del link de recuperación de contraseña ─────
  // Supabase añade #access_token=...&type=recovery al URL
  var _urlHash = window.location.hash || '';
  var _urlSearch = window.location.search || '';
  // ── ¿Viene del link de recuperación de contraseña? ────────────────
  // Supabase redirige con #access_token=...&type=recovery en el hash
  var _isRecovery = _urlHash.indexOf('type=recovery') >= 0
    || _urlSearch.indexOf('type=recovery') >= 0;

  if (_isRecovery) {
    // Limpiar hash del URL sin recargar
    if (window.history && window.history.replaceState) {
      window.history.replaceState({}, document.title, window.location.pathname);
    }
    // Dejar que Supabase procese el token del hash, luego mostrar pantalla
    setTimeout(function() {
      set({view:'auth', authMode:'newPassword', error:''});
    }, 300);
    // No llamar loadProfile — quedarse en la pantalla de nueva contraseña
    return;
  }

  // ── Timeout de seguridad: si en 4s no cargó, forzar login ──────────
  var _initTimeout = setTimeout(function() {
    if (STATE.view === 'loading') {
      set({view:'auth'});
    }
  }, 4000);

  // ── Inicialización normal ─────────────────────────────────────────
  (function() {
    try {
      SB.auth.getSession().then(function(r) {
        clearTimeout(_initTimeout);
        try {
          if (r && r.data && r.data.session && r.data.session.user) {
            loadProfile(r.data.session.user);
          } else {
            set({view:'auth'});
          }
        } catch(e) {
          console.error('loadProfile error:', e);
          set({view:'auth'});
        }
      }).catch(function(err) {
        clearTimeout(_initTimeout);
        console.error('getSession error:', err);
        set({view:'auth'});
      });
    } catch(e) {
      clearTimeout(_initTimeout);
      set({view:'auth'});
    }
  })();
}

SB.auth.onAuthStateChange(function(event, session) {
  // ── Cuando el usuario llega del link de recuperación ──────────
  if (event === 'PASSWORD_RECOVERY') {
    set({view:'auth', authMode:'newPassword', error:''});
    return;
  }
  if (event === 'SIGNED_OUT' || !session) {
    set({view:'auth', user:null, profile:null, session:[], sessions:[]});
  } else if (event === 'SIGNED_IN' && !STATE.user) {
    loadProfile(session.user);
  }
  // TOKEN_REFRESHED y otros: no interrumpir sesión activa
});

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0A0E14;color:#E8F4F8;font-family:'Nunito',sans-serif;min-height:100vh}
    button,input,select{font-family:'Nunito',sans-serif;outline:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#162850;border-radius:4px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .fade{animation:fadeUp .25s ease}
    .pulse{animation:pulse 2s ease infinite}
    /* ── WHOOP EXERCISE MODAL ────────────────────────── */
    #ex-modal-overlay{position:fixed;inset:0;z-index:800;background:rgba(10,22,40,.8);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center}
    #ex-modal{background:#0f1f3d;border:1px solid #162850;border-radius:28px 28px 0 0;width:100%;max-width:640px;height:88vh;display:flex;flex-direction:column;overflow:hidden;animation:wexSlide .28s cubic-bezier(.16,1,.3,1)}
    @keyframes wexSlide{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
    .wex-filter-bar{display:flex;border-bottom:1px solid #162850;padding:0 20px}
    .wex-fbtn{flex:1;background:transparent;border:none;border-bottom:2.5px solid transparent;color:#4a6480;font-size:11px;font-weight:800;letter-spacing:1.5px;padding:14px 4px;cursor:pointer;transition:color .18s,border-color .18s;font-family:'Nunito',sans-serif}
    .wex-fbtn.on{color:#00c9a7;border-bottom-color:#00c9a7}
    .wex-search{margin:14px 16px 10px;background:#162850;border:1.5px solid #1e3560;color:#e8f4f8;border-radius:50px;padding:11px 18px;font-size:13px;font-weight:600;width:calc(100% - 32px);transition:border-color .18s;font-family:'Nunito',sans-serif}
    .wex-search:focus{border-color:#00c9a7;outline:none}
    .wex-search::placeholder{color:#4a6480}
    .wex-list{flex:1;overflow-y:auto;padding:0 16px 140px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
    .wex-cat-hdr{font-size:10px;font-weight:800;letter-spacing:2px;color:#4a6480;padding:14px 0 8px}
    .wex-card{display:flex;align-items:center;gap:12px;background:#1c232d;border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent;transition:border-color .18s,background .18s;-webkit-tap-highlight-color:transparent}
    .wex-card:hover{background:#1e2d40}
    .wex-card.sel{border-color:#00c9a7;background:#00c9a71a}
    .wex-thumb{width:52px;height:52px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .wex-cb{width:28px;height:28px;border-radius:50%;border:2px solid #2a3f5f;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;background:transparent}
    .wex-card.sel .wex-cb{background:#00c9a7;border-color:#00c9a7}
    .wex-ib{width:28px;height:28px;border-radius:50%;background:#162850;border:none;color:#4a6480;font-size:12px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s;font-family:'Nunito',sans-serif}
    .wex-ib:hover{background:#1e3560;color:#e8f4f8}
    .wex-add{display:block;background:#162850;color:#4a6480;border:2px solid #1e3560;border-radius:14px;padding:16px 32px;font-size:14px;font-weight:900;letter-spacing:1.5px;cursor:not-allowed;pointer-events:none;transition:all .2s;font-family:'Nunito',sans-serif;width:100%;text-align:center}
    .wex-add.on{background:linear-gradient(135deg,#00c9a7,#a8e63d);color:#0a1628;border-color:transparent;cursor:pointer;pointer-events:auto;box-shadow:0 6px 24px rgba(0,201,167,.4)}
    /* Remove old vertical chip styles */
    .wex-chips-row{display:flex;gap:0;overflow-x:auto;padding:16px 20px 12px;border-bottom:1px solid #162850;scrollbar-width:none;align-items:flex-end}
    .wex-chips-row::-webkit-scrollbar{display:none}
    .wex-chip-col{display:none}
    .wex-chip-lbl{display:none}
    .wex-chip-box{display:none}
  
    /* ── BUTTON STATES ──────────────────────────────────────── */
    button{-webkit-tap-highlight-color:transparent}
    button:active{transform:scale(0.97)!important;opacity:.85!important}
    .vw-btn-primary:hover{opacity:.88!important}
    /* ── INPUT FOCUS ────────────────────────────────────────── */
    input:focus,textarea:focus{outline:none}

  user:null, profile:null, view:'loading', tab:'log',
  trainerTab:'clients', exercises:[], sessions:[], session:[],
  profileForm:{sex:'',age:'',height:'',weight:'',goals:[],goal:'',level:'',name:'',activityLevel:'moderate'},  savingProfile:false,
  expanded:null, category:null, search:'', progressEx:null,
  detailEx:null, clients:[], selectedClient:null,
  date:new Date().toISOString().slice(0,10),
  sessionNote:'', sessionTags:[], sessionSummaryOpen:false,
  heatmapMonth:null,
  authMode:'login', form:{name:'',email:'',pass:'',role:'client'},
  invite:'', saving:false, notif:null, error:'',
  rb:null, routineSearch:'', savingRoutine:false,
  clientDetailTab:'history', sessionAdjust:{},
  clientPool: []
};

function set(patch, skipRender) {
  Object.assign(STATE, patch);
  if (!skipRender) render();
}

function setInput(field, val) {
  // Update STATE without re-rendering — the input already shows the value
  STATE.form[field] = val;
}

function setInputDirect(key, val) {
  // For top-level STATE keys like search, invite
  STATE[key] = val;
}

function toast(msg, type) {
  type = type || 'ok';
  set({notif:{msg:msg,type:type}});
  setTimeout(function(){ set({notif:null}); }, 2500);
}

function setForm(field, val) {
  STATE.form[field] = val; // no re-render, input keeps focus naturally
}

function setRole(role) {
  // Sync any typed values back to STATE before re-render
  var eEl = document.getElementById('fld-email');
  var pEl = document.getElementById('fld-password');
  var nEl = document.getElementById('fld-text');
  if (eEl) STATE.form.email = eEl.value;
  if (pEl) STATE.form.pass = pEl.value;
  if (nEl) STATE.form.name = nEl.value;
  STATE.form.role = role;
  render();
}

// ══════════════════════════════════════════════════════════════
// MEJORA 1: Token expirado — interceptor global
// Si cualquier llamada a Supabase falla por auth, redirige al login
// ══════════════════════════════════════════════════════════════
var _sbOriginalFrom = SB.from.bind(SB);
SB.from = function(table) {
  var q = _sbOriginalFrom(table);
  var _origSelect = q.select.bind(q);
  // Wrap the promise resolution to catch auth errors globally
  return q;
};

// Global auth error handler — wraps all Supabase responses
function _checkAuthError(result, context) {
  if (result && result.error) {
    var msg = result.error.message || '';
    if (msg.indexOf('JWT') >= 0 || msg.indexOf('token') >= 0 ||
        msg.indexOf('expired') >= 0 || msg.indexOf('not authenticated') >= 0 ||
        result.error.status === 401) {
      console.warn('[Vitawell] Auth error in', context, '— redirecting to login');
      toast('Tu sesión expiró. Por favor inicia sesión de nuevo.', 'err');
      setTimeout(function() {
        STATE.user = null; STATE.profile = null; STATE.view = 'auth';
        STATE.session = []; STATE.sessions = [];
        render();
      }, 1500);
      return true;
    }
  }
  return false;
}

// ══════════════════════════════════════════════════════════════
// MEJORA 2: Anti-doble-tap — wrapper para botones críticos
// Evita que un tap accidental doble ejecute operaciones peligrosas
// ══════════════════════════════════════════════════════════════
var _btnCooldowns = {};

function safeTap(key, fn, cooldownMs) {
  var now = Date.now();
  cooldownMs = cooldownMs || 2000;
  if (_btnCooldowns[key] && now - _btnCooldowns[key] < cooldownMs) {
    return; // Still in cooldown
  }
  _btnCooldowns[key] = now;
  fn();
}

// ══════════════════════════════════════════════════════════════
// MEJORA 3: Responsive grid helper — colapsa columnas en pantallas pequeñas
// ══════════════════════════════════════════════════════════════
function responsiveGrid(cols, minWidth) {
  minWidth = minWidth || 320;
  var screenW = window.innerWidth || 375;
  if (screenW < 360) return '1fr';
  if (screenW < 480 && cols > 2) return '1fr 1fr';
  if (screenW < 640 && cols > 3) return 'repeat(2,1fr)';
  return 'repeat(' + cols + ',1fr)';
}

// ══════════════════════════════════════════════════════════════
// MEJORA 4: Error messages — convierte errores técnicos a humanos
// ══════════════════════════════════════════════════════════════
function friendlyError(technicalError) {
  if (!technicalError) return 'Ocurrió un error inesperado';
  var msg = String(technicalError).toLowerCase();

  if (msg.indexOf('network') >= 0 || msg.indexOf('fetch') >= 0)
    return 'Sin conexión a internet. Revisa tu wifi o datos.';
  if (msg.indexOf('duplicate') >= 0 || msg.indexOf('unique') >= 0)
    return 'Este email ya está registrado. ¿Ya tienes cuenta?';
  if (msg.indexOf('invalid login') >= 0 || msg.indexOf('invalid email or password') >= 0)
    return 'Email o contraseña incorrectos.';
  if (msg.indexOf('email not confirmed') >= 0)
    return 'Confirma tu email primero. Revisa tu bandeja de entrada.';
  if (msg.indexOf('password') >= 0 && msg.indexOf('short') >= 0)
    return 'La contraseña debe tener al menos 6 caracteres.';
  if (msg.indexOf('jwt') >= 0 || msg.indexOf('expired') >= 0)
    return 'Tu sesión expiró. Por favor inicia sesión de nuevo.';
  if (msg.indexOf('rls') >= 0 || msg.indexOf('permission') >= 0 || msg.indexOf('policy') >= 0)
    return 'Sin permisos para esta acción. Contacta a tu entrenador.';
  if (msg.indexOf('violates foreign key') >= 0)
    return 'No se puede eliminar porque tiene datos asociados.';
  if (msg.indexOf('null value') >= 0 || msg.indexOf('not null') >= 0)
    return 'Faltan campos obligatorios. Revisa el formulario.';
  if (msg.indexOf('timeout') >= 0)
    return 'La conexión tardó demasiado. Intenta de nuevo.';
  if (msg.indexOf('routines') >= 0 && msg.indexOf('exist') >= 0)
    return 'Ejecuta el SQL de rutinas en Supabase primero.';

  // Return cleaned version of technical error if no match
  return technicalError.length > 80
    ? technicalError.substring(0, 80) + '...'
    : technicalError;
}

// ══════════════════════════════════════════════════════════════
// MEJORA 5: Loading button state — feedback visual inmediato
// Reemplaza el texto del botón con spinner mientras trabaja
// ══════════════════════════════════════════════════════════════
function setButtonLoading(btnId, loading, originalText) {
  var el = document.getElementById(btnId);
  if (!el) return;
  if (loading) {
    el.disabled = true;
    el.setAttribute('data-original', el.innerHTML);
    el.innerHTML = '<span style="display:inline-flex;align-items:center;gap:8px">'
      + '<span style="width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top:2px solid #0a1628;border-radius:50%;animation:spin .7s linear infinite;display:inline-block"></span>'
      + (originalText || 'Guardando...') + '</span>';
    el.style.opacity = '0.85';
  } else {
    el.disabled = false;
    var orig = el.getAttribute('data-original');
    if (orig) el.innerHTML = orig;
    el.style.opacity = '1';
  }
}

function btn(type) {
  var base = 'border:none;border-radius:12px;padding:10px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:Nunito,sans-serif;letter-spacing:.5px;transition:opacity .15s';

function getGif(name) { return ''; }

function _normalize(str) {
  return (str||'').toLowerCase()
    .replace(/[áàäâ]/g,'a').replace(/[éèëê]/g,'e').replace(/[íìïî]/g,'i')
    .replace(/[óòöô]/g,'o').replace(/[úùüû]/g,'u').replace(/ñ/g,'n')
    .replace(/[^a-z0-9\s]/g,'').trim();
}

function groupSets(sets) {
  var groups = [], seen = {};
  (sets||[]).forEach(function(s) {
    var key = s.exercise_id || s.exercise_name;
    if (!seen[key]) {
      seen[key] = {id:s.exercise_id, name:s.exercise_name, icon:s.exercise_icon||'💪', sets:[]};
      groups.push(seen[key]);
    }
    seen[key].sets.push(s);
  });
  return groups;
}

function progressData(exId) {
  var pts = [];
  var sessions = STATE.sessions.slice().reverse();
  sessions.forEach(function(ss) {
    var sets = (ss.session_sets||[]).filter(function(s){ return s.exercise_id===exId && s.weight && s.reps; });
    if (!sets.length) return;
    var maxW = Math.max.apply(null, sets.map(function(s){ return +s.weight; }));
    var totR = sets.reduce(function(a,s){ return a+(+s.reps); }, 0);
    pts.push({date:ss.date, peso:maxW, reps:totR, vol:Math.round(sets.reduce(function(a,s){ return a+(+s.weight)*(+s.reps); },0))});
  });
  return pts;
}

function _renderHeatmap(sessions) {
  // Build day lookup: date -> session object
  var dayMap = {};
  sessions.forEach(function(ss) { dayMap[ss.date] = ss; });

  // Streak calculation
  var now = new Date();
  var streak = 0;
  for (var i = 0; i < 365; i++) {
    var d = new Date(now.getTime() - i * 86400000).toISOString().slice(0,10);
    if (dayMap[d]) streak++;
    else if (i > 0) break;
  }

  // Calendar month
  var displayMonth = STATE.heatmapMonth || new Date(now.getFullYear(), now.getMonth(), 1);
  var year = displayMonth.getFullYear();
  var month = displayMonth.getMonth();
  var monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var dayNames = ['D','L','M','X','J','V','S'];

  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var todayStr = now.toISOString().slice(0,10);

  var html = '<div style="background:' + C.card + ';border:1px solid rgba(0,201,167,0.12);border-radius:20px;padding:18px;margin-bottom:16px">';

  // Header: streak + nav
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    + '<div style="display:flex;align-items:center;gap:8px">'
      + '<span style="font-size:22px">🔥</span>'
      + '<span style="font-size:22px;font-weight:900;color:' + C.lime + '">' + streak + '</span>'
      + '<span style="font-size:10px;color:' + C.muted + ';letter-spacing:1.5px;font-weight:700"> DÍAS</span>'
    + '</div>'
    + '<div style="display:flex;align-items:center;gap:8px">'
      + '<button onclick="var d=STATE.heatmapMonth||new Date();STATE.heatmapMonth=new Date(d.getFullYear(),d.getMonth()-1,1);render()" '
        + 'style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#E8F4F8;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif">‹</button>'
      + '<span style="font-size:13px;font-weight:700;color:#E8F4F8;min-width:120px;text-align:center">' + monthNames[month] + ' ' + year + '</span>'
      + '<button onclick="var d=STATE.heatmapMonth||new Date();STATE.heatmapMonth=new Date(d.getFullYear(),d.getMonth()+1,1);render()" '
        + 'style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#E8F4F8;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:Nunito,sans-serif">›</button>'
    + '</div>'
  + '</div>';

  // Day headers
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">';
  dayNames.forEach(function(d) {
    html += '<div style="text-align:center;font-size:10px;color:' + C.muted + ';font-weight:700;letter-spacing:1px;padding:2px 0">' + d + '</div>';
  });
  html += '</div>';

  // Day cells
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';

  // Empty cells before first day
  for (var i = 0; i < firstDay; i++) {
    html += '<div></div>';
  }

  // Day cells
  for (var day = 1; day <= daysInMonth; day++) {
    var dateStr = year + '-' + String(month + 1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    var hasSession = !!dayMap[dateStr];
    var isToday = dateStr === todayStr;
    var isSelected = STATE.selectedHistoryDate === dateStr;
    var isFuture = dateStr > todayStr;

    var bg, textColor, border;
    if (isSelected) {
      bg = C.aqua; textColor = '#0A0E14'; border = 'none';
    } else if (hasSession) {
      bg = C.lime + '22'; textColor = C.lime; border = '1.5px solid ' + C.lime + '66';
    } else if (isToday) {
      bg = 'rgba(255,255,255,0.06)'; textColor = '#E8F4F8'; border = '1px solid rgba(255,255,255,0.2)';
    } else {
      bg = 'transparent'; textColor = isFuture ? 'rgba(255,255,255,0.12)' : C.muted; border = 'none';
    }

    html += '<button onclick="STATE.selectedHistoryDate=\'' + dateStr + '\';_renderHistoryDetail(\'' + dateStr + '\')" '
      + 'style="aspect-ratio:1;border-radius:8px;border:' + border + ';background:' + bg + ';'
      + 'color:' + textColor + ';font-size:12px;font-weight:' + (hasSession || isToday ? '800' : '500') + ';'
      + 'cursor:' + (isFuture ? 'default' : 'pointer') + ';font-family:Nunito,sans-serif;padding:0;'
      + 'display:flex;align-items:center;justify-content:center;position:relative;">'
      + day
      + (hasSession && !isSelected ? '<span style="position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:' + C.lime + '"></span>' : '')
      + '</button>';
  }
  html += '</div></div>';
  return html;
}

function _renderHistoryDetail(dateStr) {
  var mount = document.getElementById('history-detail-mount');
  if (!mount) return;

  // Find session for this date
  var session = STATE.sessions.find(function(ss) { return ss.date === dateStr; });

  if (!session) {
    mount.style.opacity = '0';
    mount.innerHTML = '<div style="background:' + C.card + ';border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:24px;text-align:center;animation:fadeUp .25s ease">'
      + '<div style="font-size:32px;margin-bottom:10px">🌙</div>'
      + '<div style="font-size:14px;font-weight:700;color:#E8F4F8;margin-bottom:6px">Sin entrenamiento</div>'
      + '<div style="font-size:12px;color:rgba(255,255,255,0.35)">No hay registros para este día.</div>'
      + '</div>';
    mount.style.transition = 'opacity .2s';
    setTimeout(function(){ mount.style.opacity = '1'; }, 10);
    return;
  }

  var groups = groupSets(session.session_sets || []);
  var totalVol = Math.round((session.session_sets||[]).reduce(function(a,x){ return a+(+(x.weight)||0)*(+(x.reps)||0); },0));
  var d = new Date(dateStr + 'T12:00:00');
  var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var dateLabel = d.getDate() + ' de ' + months[d.getMonth()] + ', ' + d.getFullYear();

  var html = '<div style="animation:fadeUp .25s ease">';

  // Date header
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    + '<div style="font-size:14px;font-weight:800;color:#E8F4F8">' + dateLabel + '</div>'
    + '<div style="display:flex;gap:6px">'
      + '<div style="background:' + C.aqua + '18;border:1px solid ' + C.aqua + '33;border-radius:20px;padding:4px 10px;font-size:10px;color:' + C.aqua + ';font-weight:800;letter-spacing:.5px">' + groups.length + ' EJERCICIOS</div>'
      + '<div style="background:rgba(168,230,61,0.12);border:1px solid rgba(168,230,61,0.25);border-radius:20px;padding:4px 10px;font-size:10px;color:' + C.lime + ';font-weight:800;letter-spacing:.5px">' + totalVol + 'kg VOL</div>'
    + '</div>'
  + '</div>';

  // Exercise blocks
  groups.forEach(function(gr) {
    var cols = getCatColor(gr.category || '');
    html += '<div style="background:#0A0E14;border:1px solid rgba(255,255,255,0.05);border-left:3px solid ' + cols[0] + ';border-radius:12px;padding:12px 14px;margin-bottom:8px">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
        + '<span style="font-size:16px">' + (gr.icon || '💪') + '</span>'
        + '<div style="font-size:13px;font-weight:800;color:#E8F4F8">' + gr.name + '</div>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px">';

    gr.sets.forEach(function(s, si) {
      var rpeCol = s.rpe ? (+s.rpe >= 9 ? '#ef4444' : +s.rpe >= 7 ? '#f59e0b' : '#4ade80') : C.muted;
      html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px;text-align:center">'
        + '<div style="font-size:10px;color:' + C.muted + ';letter-spacing:1px;margin-bottom:4px">SERIE ' + (si+1) + '</div>'
        + '<div style="font-size:13px;font-weight:800;color:#E8F4F8">' + (s.weight || '—') + '<span style="font-size:9px;font-weight:500;color:' + C.muted + '">kg</span></div>'
        + '<div style="font-size:11px;color:' + C.aqua + '">' + (s.reps || '—') + '<span style="font-size:9px;color:' + C.muted + '"> reps</span></div>'
        + (s.rpe ? '<div style="font-size:10px;font-weight:700;color:' + rpeCol + ';margin-top:2px">RPE ' + s.rpe + '</div>' : '')
        + '</div>';
    });

    html += '</div></div>';
  });

  if (session.notes) {
    html += '<div style="background:rgba(0,201,167,0.05);border:1px solid rgba(0,201,167,0.12);border-radius:10px;padding:10px 14px;margin-top:4px">'
      + '<div style="font-size:11px;color:' + C.aqua + ';font-weight:700;letter-spacing:1px;margin-bottom:4px">NOTA</div>'
      + '<div style="font-size:12px;color:rgba(232,244,248,0.6);line-height:1.6">' + session.notes + '</div>'
      + '</div>';
  }

  html += '</div>';

  mount.style.opacity = '0';
  mount.innerHTML = html;
  mount.style.transition = 'opacity .2s';
  setTimeout(function(){ mount.style.opacity = '1'; }, 10);
}


function addRoutineEx(id) {
  var ex = STATE.exercises.find(function(e){ return e.id===id; });
  if (!ex) return;
  STATE.routineEditor = STATE.routineEditor || {name:'', exercises:[], clientId:''};
  var already = STATE.routineEditor.exercises.find(function(e){return e.id===id;});
  if (already) {
    STATE.routineEditor.exercises = STATE.routineEditor.exercises.filter(function(e){return e.id!==id;});
  } else {
    STATE.routineEditor.exercises = STATE.routineEditor.exercises.concat([{id:ex.id,name:ex.name,icon:ex.icon,category:ex.category,sets:3,reps:10,rpeTarget:7}]);
  }
  render();
}

function removeRoutineEx(idx) {
  if (!STATE.routineEditor) return;
  STATE.routineEditor.exercises = STATE.routineEditor.exercises.filter(function(_,i){return i!==idx;});
  render();
}

function updRoutineEx(idx, field, val) {
  if (!STATE.routineEditor || !STATE.routineEditor.exercises[idx]) return;
  STATE.routineEditor.exercises[idx][field] = +val;
}

async function saveRoutine() {
  var rt = STATE.routineEditor;
  if (!rt || !rt.name || !rt.name.trim()) { toast('Agrega un nombre a la rutina','err'); return; }
  if (!rt.exercises || !rt.exercises.length) { toast('Agrega al menos un ejercicio','err'); return; }
  set({savingRoutine:true});
  var payload = {
    trainer_id: STATE.user.id,
    client_id: rt.clientId || null,
    name: rt.name.trim(),
    exercises: JSON.stringify(rt.exercises),
    created_at: new Date().toISOString()
  };
  var r = await SB.from('routines').insert(payload);
  if (r.error) {
    toast('Error: tabla routines no existe aun. Crea la tabla en Supabase primero.','err');
  } else {
    toast('Rutina guardada ✅');
    STATE.routineEditor = {name:'', exercises:[], clientId:''};
  }
  set({savingRoutine:false});
}

function updAdj(idx, field, val) {
  STATE.sessionAdjust = STATE.sessionAdjust || {};
  STATE.sessionAdjust[field+'_'+idx] = +val;
}

function adjustAll(pct) {
  var cl = STATE.selectedClient;
  if (!cl || !cl.sessions || !cl.sessions[0]) return;
  var groups = groupSets(cl.sessions[0].session_sets);
  STATE.sessionAdjust = {};
  var p = +pct / 100;
  groups.forEach(function(ex, i) {
    var maxW = Math.max.apply(null, ex.sets.map(function(ss){return +(ss.weight)||0;}));
    var newW = pct==='0' ? maxW : Math.round((maxW * (1+p)) * 2) / 2;
    STATE.sessionAdjust['w_'+i] = Math.max(0, newW);
    STATE.sessionAdjust['s_'+i] = ex.sets.length;
    STATE.sessionAdjust['r_'+i] = Math.round(ex.sets.reduce(function(a,ss){return a+(+(ss.reps)||0);},0)/ex.sets.length);
  });
  render();
  toast(pct==='0'?'Sin cambios':'Pesos ajustados '+pct+'%');
}

async function sendAdjustedRoutine(clientId) {
  var cl = STATE.selectedClient;
  if (!cl || !cl.sessions || !cl.sessions[0]) return;
  var groups = groupSets(cl.sessions[0].session_sets);
  var adj = STATE.sessionAdjust || {};
  var exercises = groups.map(function(ex, i) {
    return {
      name:ex.name,
      sets:adj['s_'+i]!==undefined?adj['s_'+i]:ex.sets.length,
      reps:adj['r_'+i]!==undefined?adj['r_'+i]:Math.round(ex.sets.reduce(function(a,ss){return a+(+(ss.reps)||0);},0)/ex.sets.length),
      weight:adj['w_'+i]!==undefined?adj['w_'+i]:Math.max.apply(null,ex.sets.map(function(ss){return +(ss.weight)||0;}))
    };
  });
  var note = 'Próxima sesión ajustada: ' + exercises.map(function(e){return e.name+' '+e.sets+'×'+e.reps+'@'+e.weight+'kg';}).join(' · ');
  var r = await SB.from('profiles').update({trainer_note: note}).eq('id', clientId);
  if (r.error) {
    toast('Error enviando rutina','err');
  } else {
    STATE.selectedClient = Object.assign({}, STATE.selectedClient, {trainer_note: note});
    STATE.sessionAdjust = {};
    toast('Rutina ajustada enviada ⚡');
    set({clientDetailTab:'note'});
  }
}

async function saveTrainerNote(clientId) {
  var ta = document.getElementById('trainer-note-'+clientId);
  if (!ta) return;
  var note = ta.value.trim();
  await SB.from('profiles').update({trainer_note: note||null}).eq('id', clientId);
  if (STATE.selectedClient && STATE.selectedClient.id === clientId) {
    STATE.selectedClient = Object.assign({}, STATE.selectedClient, {trainer_note: note});
  }
  STATE.clients = STATE.clients.map(function(c){
    return c.id===clientId ? Object.assign({},c,{trainer_note:note}) : c;
  });
  toast('Nota guardada 📝');
}

function renderOnboarding(app) {
  var step = STATE.onboardingStep || 0;
  var steps = [
    {icon:'💪', title:'Bienvenido a Vitawell', subtitle:'TU PLATAFORMA DE ENTRENAMIENTO',
     desc:'Registra tus sesiones, sigue tu progreso y entrena más inteligente con datos reales.', btn:'Empezar', color:C.aqua},
    {icon:'🏋️', title:'Registra cada serie', subtitle:'KG · REPS · RPE',
     desc:'Ingresa el peso, repeticiones y tu nivel de esfuerzo (RPE 1-10). La app analiza tu rendimiento en tiempo real.', btn:'Entendido', color:C.lime},
    {icon:'📈', title:'Ve tu progreso', subtitle:'OBJETIVO INTELIGENTE',
     desc:'La app calcula qué peso y repeticiones intentar en tu próxima sesión basado en tu historial.', btn:'¡Empecemos!', color:'#818cf8'}
  ];
  var s2 = steps[step];
  var dots = steps.map(function(_,i){
    return '<div style="width:'+(i===step?'20':'8')+'px;height:8px;border-radius:4px;background:'+(i===step?s2.color:C.border)+';transition:all .3s"></div>';
  }).join('');
  app.innerHTML = '<div style="min-height:100vh;background:'+C.bg+';display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center">'
    +'<div style="width:100px;height:100px;border-radius:28px;background:linear-gradient(135deg,'+s2.color+'33,'+s2.color+'11);border:2px solid '+s2.color+'44;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:28px">'+s2.icon+'</div>'
    +'<div style="font-family:\'Space Grotesk\',sans-serif;font-size:26px;font-weight:700;color:'+C.white+';margin-bottom:8px">'+s2.title+'</div>'
    +'<div style="font-size:11px;font-weight:800;color:'+s2.color+';letter-spacing:2px;margin-bottom:16px">'+s2.subtitle+'</div>'
    +'<div style="font-size:15px;color:'+C.muted+';line-height:1.7;max-width:300px;margin-bottom:40px">'+s2.desc+'</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:32px">'+dots+'</div>'
    +'<button onclick="advanceOnboarding()" style="'+btn('aqua')+';width:100%;max-width:280px;padding:16px;font-size:16px;border-radius:16px">'+s2.btn+' →</button>'
    +(step < 2 ? '<button onclick="finishOnboarding()" style="background:transparent;border:none;color:'+C.muted+';font-size:13px;cursor:pointer;margin-top:16px;font-family:Nunito,sans-serif">Saltar</button>' : '')
    +'</div>';
}
function advanceOnboarding() {
  var step = (STATE.onboardingStep||0)+1;
  if(step>=3){ finishOnboarding(); } else { STATE.onboardingStep=step; renderOnboarding(document.getElementById('app')); }
}
function finishOnboarding() {
  try{ localStorage.setItem('vitawell-onboarded','1'); }catch(e){}
  STATE.onboardingStep=null; STATE.view='client'; render();
}

// ROUTINE BUILDER — Constructor completo con drag & drop
// Estado en STATE.rb (routine builder)

var RB_CATS = [
  {id:'all',    label:'Todo',        icon:'⚡'},
  {id:'fuerza', label:'Fuerza',      icon:'🏋️'},
  {id:'empuje', label:'Empuje',      icon:'💪'},
  {id:'jalon',  label:'Jalón',       icon:'🔝'},
  {id:'piernas',label:'Piernas',     icon:'🦵'},
  {id:'core',   label:'Core',        icon:'🎯'},
  {id:'cardio', label:'Cardio',      icon:'❤️'},
];

var RB_CAT_MAP = {
  'fuerza':  ['Pecho','Espalda','Hombros','Piernas','Glúteos'],
  'empuje':  ['Pecho','Hombros','Tríceps'],
  'jalon':   ['Espalda','Bíceps','Trapecios'],
  'piernas': ['Piernas','Glúteos','Pantorrillas'],
  'core':    ['Core'],
  'cardio':  ['Cardio'],
};

// Drag state
var RB_DRAG = {idx: null, over: null};

function rbInit() {
  if (!STATE.rb) STATE.rb = {
    name: '', clientId: '', catFilter: 'all', search: '',
    exercises: [], savedRoutines: [],
    showSaved: false, loadingSaved: false
  };
  // Ensure exercises are loaded — trainer needs them too
  if (!STATE.exercises || !STATE.exercises.length) {
    SB.from('exercises').select('*').order('category').order('name').then(function(r) {
      if (r.data && r.data.length) {
        STATE.exercises = r.data;
        renderRoutineBuilder();
      }
    });
  }
}

function rbSet(patch) {
  rbInit();
  Object.assign(STATE.rb, patch);
  renderRoutineBuilder();
}

// ══════════════════════════════════════════════════════════════
// ROUTINE BUILDER — FIXES
// 1. _rbUpdateList: patches only the exercise list (no focus loss)
// 2. Flujo 2-pasos: SELECCIONAR → CONFIGURAR → GUARDAR
// ══════════════════════════════════════════════════════════════

// Lightweight list updater — only patches #rb-ex-list, never destroys search input
function _rbUpdateList() {
  var rb  = STATE.rb;
  var exs = STATE.exercises || [];
  if (!rb) return;

  var cats = rb.catFilter === 'all' ? null : (RB_CAT_MAP[rb.catFilter] || []);
  var q    = _normalize(rb.search || '');

  var filtered = exs.filter(function(e) {
    if (!e || !e.name) return false;
    if (cats && cats.indexOf(e.category) < 0) return false;
    if (q && _normalize(e.name).indexOf(q) < 0 && _normalize(e.category).indexOf(q) < 0) return false;
    return true;
  });

  var list = document.getElementById('rb-ex-list');
  if (!list) return;

  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px 16px;color:#4a6480">'
      + '<div style="font-size:28px;margin-bottom:8px">🔍</div>'
      + '<div style="font-size:13px;font-weight:700">Sin resultados</div>'
      + '</div>';
    return;
  }

  var inBuilder = {};
  (rb.exercises || []).forEach(function(e) { inBuilder[e.id] = true; });

  var html = '';
  filtered.forEach(function(ex) {
    var added = !!inBuilder[ex.id];
    var cols  = getCatColor(ex.category || '');
    html += '<div onclick="rbToggleEx(\'' + ex.id + '\')" '
      + 'style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;'
      + 'border:1.5px solid ' + (added ? cols[0] : '#1e3560') + ';'
      + 'background:' + (added ? cols[0] + '15' : '#0f1e35') + ';'
      + 'cursor:pointer;margin-bottom:6px;transition:all .15s;-webkit-tap-highlight-color:transparent">'
      + '<div style="width:38px;height:38px;border-radius:10px;background:' + cols[0] + '22;'
        + 'border:1px solid ' + cols[0] + '33;display:flex;align-items:center;'
        + 'justify-content:center;font-size:18px;flex-shrink:0">' + ex.icon + '</div>'
      + '<div style="flex:1;min-width:0">'
        + '<div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + ex.name + '</div>'
        + '<div style="font-size:10px;color:' + cols[0] + ';font-weight:800;letter-spacing:.5px">' + ex.category.toUpperCase() + '</div>'
      + '</div>'
      + '<div style="width:26px;height:26px;border-radius:50%;border:2px solid '
        + (added ? cols[0] : '#2a3f5f') + ';background:' + (added ? cols[0] : 'transparent')
        + ';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
        + (added ? '<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" stroke="#0a1628" stroke-width="2" fill="none" stroke-linecap="round"/></svg>' : '')
      + '</div>'
      + '</div>';
  });

  list.innerHTML = html;

  // Update the floating "Siguiente" button count
  _rbUpdateFloatingBtn();
}

// Update floating action button
function _rbUpdateFloatingBtn() {
  var rb   = STATE.rb;
  var sel  = rb && rb.exercises ? rb.exercises.length : 0;
  var fab  = document.getElementById('rb-fab');
  if (!fab) return;

  if (sel > 0) {
    fab.style.display    = 'flex';
    fab.style.opacity    = '1';
    fab.style.transform  = 'translateX(-50%) translateY(0)';
    fab.innerHTML = '<span style="font-size:16px">⚡</span>'
      + '<span>Configurar ' + sel + ' ejercicio' + (sel > 1 ? 's' : '') + '</span>'
      + '<span style="background:rgba(0,0,0,.2);border-radius:20px;padding:3px 10px;font-size:12px">'
        + sel + '</span>';
  } else {
    fab.style.transform = 'translateX(-50%) translateY(20px)';
    fab.style.opacity   = '0';
    setTimeout(function() {
      if (!STATE.rb || !STATE.rb.exercises || !STATE.rb.exercises.length) fab.style.display = 'none';
    }, 200);
  }
}

// Step 2: Show configuration panel for selected exercises
function rbGoToConfig() {
  var rb = STATE.rb;
  if (!rb || !rb.exercises || !rb.exercises.length) return;

  // Switch to config view
  STATE.rb.step = 'config';
  renderRoutineBuilder();
}

  STATE.rb.step = 'select';
  renderRoutineBuilder();
}

    + 'align-items:center;gap:10px;'
    + 'background:linear-gradient(135deg,#00c9a7,#a8e63d);'
    + 'color:#0a1628;border:none;border-radius:50px;'

    + '<span style="background:rgba(0,0,0,.2);border-radius:20px;padding:3px 10px;font-size:13px">' + selCount + '</span>'
    + '</div>';

  html += '</div>';

  // Restore search focus if user was typing
  if (rb.search) {
    setTimeout(function() {

      if (si) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
    }, 0);
  }
}


// ── Drag & Drop ───────────────────────────────────────────────
function rbDragStart(i) {
  RB_DRAG.idx = i;
}
function rbDragOver(e, i) {
  e.preventDefault();
  if (RB_DRAG.over !== i) { RB_DRAG.over = i; renderRoutineBuilder(); }
}
function rbDrop(i) {
  var from = RB_DRAG.idx, to = i;
  if (from === null || from === to) { RB_DRAG.idx = null; RB_DRAG.over = null; return; }
  var arr = STATE.rb.exercises.slice();
  var item = arr.splice(from, 1)[0];
  arr.splice(to, 0, item);
  STATE.rb.exercises = arr;
  RB_DRAG.idx = null; RB_DRAG.over = null;
  renderRoutineBuilder();
}
function rbDragEnd() {
  RB_DRAG.idx = null; RB_DRAG.over = null;
  renderRoutineBuilder();
}

// ── Exercise actions ──────────────────────────────────────────
function rbToggleEx(id) {
  rbInit();
  var already = STATE.rb.exercises.find(function(e) { return e.id === id; });
  if (already) {
    STATE.rb.exercises = STATE.rb.exercises.filter(function(e) { return e.id !== id; });
  } else {
    var ex = STATE.exercises.find(function(e) { return e.id === id; });
    if (!ex) return;
    STATE.rb.exercises = STATE.rb.exercises.concat([{
      id: ex.id, name: ex.name, icon: ex.icon, category: ex.category,
      sets: 3, reps: 10, weight: '', rpeTarget: '', rest: '90s', note: ''
    }]);
  }
  renderRoutineBuilder();
}

function rbUpdEx(i, field, val) {
  if (!STATE.rb || !STATE.rb.exercises[i]) return;
  STATE.rb.exercises[i][field] = field === 'note' ? val : (val === '' ? '' : +val || val);
  // Update only the affected input's sibling display, no full re-render
  // for sets stepper sync
  if (field === 'sets') {
    var inp = document.getElementById('rbs-' + i);
    if (inp) inp.value = STATE.rb.exercises[i].sets;
  }
}

function rbRemoveEx(i) {
  rbInit();
  STATE.rb.exercises = STATE.rb.exercises.filter(function(_, idx) { return idx !== i; });
  renderRoutineBuilder();
}

// ── Saved routines ────────────────────────────────────────────
async function rbToggleSaved() {
  rbInit();
  STATE.rb.showSaved = !STATE.rb.showSaved;
  if (STATE.rb.showSaved && (!STATE.rb.savedRoutines || !STATE.rb.savedRoutines.length)) {
    STATE.rb.loadingSaved = true;
    renderRoutineBuilder();
    var r = await SB.from('routines').select('*').eq('trainer_id', STATE.user.id).order('created_at', {ascending:false});
    STATE.rb.savedRoutines = r.data || [];
    STATE.rb.loadingSaved = false;
  }
  renderRoutineBuilder();
}

async function rbLoad(routineId) {
  rbInit();
  var rt = STATE.rb.savedRoutines.find(function(r) { return r.id === routineId; });
  if (!rt) return;
  var exs = [];
  try { exs = JSON.parse(rt.exercises); } catch(e) {}
  STATE.rb.name = rt.name;
  STATE.rb.clientId = rt.client_id || '';
  STATE.rb.exercises = exs.map(function(e) {
    return {
      id: e.id, name: e.name, icon: e.icon || '💪', category: e.category || '',
      sets: e.sets || 3, reps: e.reps || 10, weight: e.weight || '',
      rpeTarget: e.rpeTarget || '', rest: e.rest || '90s', note: e.note || ''
    };
  });
  STATE.rb.showSaved = false;
  renderRoutineBuilder();
  toast('Rutina "' + rt.name + '" cargada ✅');
}

async function rbDeleteRoutine(routineId) {
  if (!confirm('¿Eliminar esta rutina?')) return;
  await SB.from('routines').delete().eq('id', routineId);
  STATE.rb.savedRoutines = (STATE.rb.savedRoutines || []).filter(function(r) { return r.id !== routineId; });
  renderRoutineBuilder();
  toast('Rutina eliminada');
}

// ── Save ──────────────────────────────────────────────────────
async function rbSave() {
  rbInit();
  var rb = STATE.rb;
  if (!rb.name || !rb.name.trim()) { toast('Agrega un nombre a la rutina','err'); return; }
  if (!rb.exercises || !rb.exercises.length) { toast('Agrega al menos un ejercicio','err'); return; }
  STATE.rb.saving = true;
  renderRoutineBuilder();
  var payload = {
    trainer_id: STATE.user.id,
    client_id:  rb.clientId || null,
    name:       rb.name.trim(),
    exercises:  JSON.stringify(rb.exercises),
    created_at: new Date().toISOString()
  };
  var r = await SB.from('routines').insert(payload).select();
  STATE.rb.saving = false;
  if (r.error) {
    toast('Error: asegúrate de crear la tabla routines en Supabase', 'err');
  } else {
    toast('Rutina "' + rb.name + '" guardada ✅');
    // Add to saved list
    if (r.data && r.data[0]) {
      STATE.rb.savedRoutines = [r.data[0]].concat(STATE.rb.savedRoutines || []);
    }
    // If assigned to client — write note
    if (rb.clientId) {
      var summary = rb.exercises.map(function(e) {
        return e.sets + '×' + e.reps + ' ' + e.name + (e.weight ? ' @' + e.weight + 'kg' : '') + (e.rpeTarget ? ' RPE' + e.rpeTarget : '');
      }).join('\n');
      var note = '📋 Rutina: ' + rb.name + '\n' + summary;
      await SB.from('profiles').update({trainer_note: note}).eq('id', rb.clientId);
      // Refresh client in state
      STATE.clients = STATE.clients.map(function(cl) {
        return cl.id === rb.clientId ? Object.assign({}, cl, {trainer_note: note}) : cl;
      });
      toast('Rutina asignada y enviada a ' + (STATE.clients.find(function(c){return c.id===rb.clientId;}) || {}).full_name);
    }
  }
  renderRoutineBuilder();
}


async function loadProfile(user) {
  try {
  var r = await SB.from('profiles').select('*').eq('id', user.id).single();
  var data = r.data;

  // Fallback 1: retry without .single()
  if (!data) {
    var r2 = await SB.from('profiles').select('*').eq('id', user.id);
    data = (r2.data && r2.data.length) ? r2.data[0] : null;
  }

  // Fallback 2: build from auth metadata (always available, set during signUp)
  var meta = user.user_metadata || {};
  if (!data) {
    data = {
      id:               user.id,
      email:            user.email,
      role:             meta.role || 'client',
      full_name:        meta.full_name || user.email.split('@')[0],
      profile_complete: false
    };
  }

  // CRITICAL: if DB has role but metadata also has it, trust metadata for trainer
  // (metadata is set directly on signUp, can't be blocked by RLS)
  if (meta.role === 'trainer') {
    data.role = 'trainer';
  }

  // Final fallback
  if (!data.role) data.role = 'client';

  var view = data.role === 'trainer' ? 'trainer' : 'client';
  console.log('[Vitawell] email:', user.email, '| DB role:', r.data && r.data.role, '| meta role:', meta.role, '| final view:', view);
  if (view === 'client') {
    var exR = await SB.from('exercises').select('*').order('category').order('name');
    var ssR = await SB.from('workout_sessions').select('*, session_sets(*)').eq('client_id', user.id).order('date', {ascending:false});
    var ex = exR.data || [];
    // Preserve active session (exercises being logged right now)
    var currentSession = STATE.session && STATE.session.length ? STATE.session : [];
    // Onboarding: show profile completion for new clients
    // Uses profile_complete field in DB (set to true after first save)
    var profileComplete = data && data.profile_complete === true;
    var localOnboarded = false;
    try { localOnboarded = !!localStorage.getItem('vitawell-onboarded-' + user.id); } catch(e) {}
    // Initialize profileForm from loaded profile — declared FIRST
    var initPF = {
      name:          data ? (data.full_name || '') : '',
      sex:           data ? (data.sex || '')       : '',
      age:           data ? (data.age || '')        : '',
      height:        data ? (data.height_cm || '')  : '',
      weight:        data ? (data.weight_kg || '')  : '',
      goal:          data ? (data.goal || '')       : '',
      goals:         data && data.goals && data.goals.length ? data.goals : (data && data.goal ? [data.goal] : []),
      level:         data ? (data.level || '')      : '',
      activityLevel: data ? (data.activity_level || 'moderate') : 'moderate'
    };

    // Skip onboarding if profile already has basic data filled
    var hasBasicData = data && data.full_name && data.height_cm && data.weight_kg;
    var needsOnboarding = !profileComplete && !localOnboarded && !hasBasicData;

    if (needsOnboarding) {
      STATE.user = user; STATE.profile = data; STATE.view = view;
      STATE.exercises = ex; STATE.sessions = ssR.data||[];
      STATE.category = ex[0] ? ex[0].category : null;
      STATE.session = currentSession;
      STATE.profileForm = initPF;
      STATE.error = '';        // ← clear any leftover auth errors
      STATE.saving = false;
      STATE.savingProfile = false;
      showProfileCompletion();
      return;
    }
    set({user:user, profile:data, view:view, exercises:ex, sessions:ssR.data||[], category:ex[0]?ex[0].category:null, session:currentSession, profileForm:initPF});
    // Restore any draft session from localStorage
    setTimeout(_restoreDraftSession, 800);
  } else {
    // Trainer: load exercises + clients + last session dates in parallel
    var trainerExR = await SB.from('exercises').select('*').order('category').order('name');
    // Load ALL clients — both assigned (trainer_id) and unassigned
    var cl = await SB.from('profiles').select('*').eq('role', 'client').order('full_name');
    var clients = cl.data || [];
    if (clients.length) {
      var sessR = await SB.from('workout_sessions')
        .select('client_id, date')
        .in('client_id', clients.map(function(c){return c.id;}))
        .order('date', {ascending:false});
      var lastMap = {};
      (sessR.data||[]).forEach(function(s){ if(!lastMap[s.client_id]) lastMap[s.client_id]=s.date; });
      clients = clients.map(function(c){ return Object.assign({}, c, {last_session: lastMap[c.id]||null}); });
    }
    var trainerEx = trainerExR.data || [];
    STATE.user = user; STATE.profile = data; STATE.view = view;
    STATE.exercises = trainerEx;
    STATE.category  = trainerEx[0] ? trainerEx[0].category : null;
    STATE.clients   = clients;
    // Load unassigned client pool in background
    SB.from('profiles').select('id,full_name,email,role').eq('role','client').is('trainer_id',null).limit(50)
      .then(function(pr){ STATE.clientPool = (pr.data||[]).filter(function(p){ return !STATE.clients.find(function(m){return m.id===p.id;}); }); });
    render();
  }
  } catch(e) {
    console.error('loadProfile error:', e);
    set({view:'auth'});
  }
}


// ── Live metabolic stats update — no re-render, just patch DOM ──
function _updateMetaStats() {
  var pf = STATE.profileForm || {};
  var bmi = null, bmiLabel = '', bmiColor = '#00c9a7';
  if (pf.weight && pf.height) {
    var hm = parseFloat(pf.height)/100;
    bmi = (parseFloat(pf.weight)/(hm*hm)).toFixed(1);
    if      (bmi < 18.5) { bmiLabel='Bajo peso';  bmiColor='#60a5fa'; }
    else if (bmi < 25)   { bmiLabel='Normal';      bmiColor='#a8e63d'; }
    else if (bmi < 30)   { bmiLabel='Sobrepeso';   bmiColor='#f59e0b'; }
    else                 { bmiLabel='Obesidad';    bmiColor='#f87171'; }
  }
  var tmb = null;
  if (pf.weight && pf.height && pf.age && pf.sex) {
    var w2=parseFloat(pf.weight), h2=parseFloat(pf.height), a2=parseFloat(pf.age);
    tmb = pf.sex==='M' ? Math.round(10*w2+6.25*h2-5*a2+5) : Math.round(10*w2+6.25*h2-5*a2-161);
  }
  var ACT = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
  var get = tmb ? Math.round(tmb * (ACT[pf.activityLevel||'moderate']||1.55)) : null;

  // Patch only the stat values without touching inputs
  var els = {
    'pf-stat-bmi-val':   bmi || '--',
    'pf-stat-bmi-lbl':   bmiLabel || '--',
    'pf-stat-weight-val': pf.weight ? pf.weight+'kg' : '--',
    'pf-stat-height-lbl': pf.height ? pf.height+' cm' : '--',
    'pf-stat-tmb-val':   tmb || '--',
    'pf-stat-get-val':   get || '--',
  };
  Object.keys(els).forEach(function(id) {
    var el = document.getElementById(id);
    if (el) el.textContent = els[id];
  });

  // Update bmi color
  var bmiEl = document.getElementById('pf-stat-bmi-val');
  if (bmiEl && bmi) bmiEl.style.color = bmiColor;
}

async function saveProfileCompletion() {
  if (!STATE.profile || !STATE.user) {
    console.error('No profile/user in STATE');
    return;
  }

  // Read values directly from DOM inputs — most reliable
  var nameEl   = document.getElementById('pc-name');
  var ageEl    = document.getElementById('pc-age');
  var heightEl = document.getElementById('pc-height');
  var weightEl = document.getElementById('pc-weight');

  // Sync DOM → STATE.profileForm
  if (!STATE.profileForm) STATE.profileForm = {};
  if (nameEl)   STATE.profileForm.name   = nameEl.value;
  if (ageEl)    STATE.profileForm.age    = ageEl.value;
  if (heightEl) STATE.profileForm.height = heightEl.value;
  if (weightEl) STATE.profileForm.weight = weightEl.value;

  var pf = STATE.profileForm;

  // Validate
  var name = (pf.name || '').trim();
  if (!name || name.length < 2) {
    STATE.error = 'Ingresa tu nombre completo';
    showProfileCompletion(); return;
  }
  if (!pf.sex) {
    STATE.error = 'Selecciona tu sexo biológico';
    showProfileCompletion(); return;
  }
  var age = parseInt(pf.age);
  if (!age || age < 10 || age > 100) {
    STATE.error = 'Ingresa una edad válida (10–100)';
    showProfileCompletion(); return;
  }
  var height = parseFloat(pf.height);
  if (!height || height < 100 || height > 250) {
    STATE.error = 'Ingresa tu estatura en cm (100–250)';
    showProfileCompletion(); return;
  }
  var weight = parseFloat(pf.weight);
  if (!weight || weight < 30 || weight > 300) {
    STATE.error = 'Ingresa tu peso en kg (30–300)';
    showProfileCompletion(); return;
  }

  STATE.savingProfile = true;
  STATE.error = '';
  // Show spinner without full re-render — just update button text
  var btn = document.querySelector('#pc-submit-btn');
  if (btn) btn.innerHTML = '⏳ Guardando...';

  // Update with only the base columns that always exist
  var updates = {
    full_name: name,
    sex:       pf.sex,
    age:       age,
    height_cm: height,
    weight_kg: weight,
    goal:      (pf.goals && pf.goals.length) ? pf.goals[0] : null,
    level:     pf.level || 'beginner'
  };

  var r = await SB.from('profiles').update(updates).eq('id', STATE.profile.id);

  if (r.error) {
    STATE.error = 'Error: ' + r.error.message;
    STATE.savingProfile = false;
    showProfileCompletion();
    return;
  }

  // Mark as onboarded locally
  try { localStorage.setItem('vitawell-onboarded-' + STATE.user.id, '1'); } catch(e) {}
  try { localStorage.setItem('vitawell-onboarded', '1'); } catch(e) {}

  // Update STATE and go to app
  STATE.profile = Object.assign({}, STATE.profile, updates);
  STATE.profileForm = Object.assign({}, STATE.profileForm, {
    name: name, age: age, height: height, weight: weight
  });
  STATE.savingProfile = false;
  STATE.error = '';
  STATE.tab = 'log';
  STATE.view = 'client';
  toast('¡Bienvenido ' + name.split(' ')[0] + '! 💪');
  render();
}


// ══════════════════════════════════════════════════════════════
// loadRoutineIntoSession — carga los ejercicios de la rutina
// del entrenador directamente en STATE.session
// ══════════════════════════════════════════════════════════════
function loadRoutineIntoSession() {
  var trNote = STATE.profile && STATE.profile.trainer_note;
  if (!trNote) {
    toast('Sin rutina asignada aún', 'err');
    return;
  }

  var exercises = [];

  // Parse the trainer note format: "📋 Rutina: Nombre\n3×10 Ejercicio @80kg RPE7\n..."
  var lines = trNote.split('\n');
  lines.forEach(function(line) {
    line = line.trim();
    if (!line || line.indexOf('📋 Rutina:') === 0) return;

    // Format: "3×10 Nombre del Ejercicio @75kg RPE7"
    var match = line.match(/^(\d+)[×x](\d+)\s+(.+?)(?:\s+@(\d+(?:\.\d+)?)kg)?(?:\s+RPE(\d+))?$/);
    if (!match) return;

    var sets  = parseInt(match[1]) || 3;
    var reps  = match[2] || '10';
    var name  = match[3].trim();
    var weight = match[4] || '';
    var rpe   = match[5] || '';

    // Find exercise in library by name (fuzzy match)
    var libEx = (STATE.exercises || []).find(function(e) {
      return _normalize(e.name) === _normalize(name) ||
             _normalize(e.name).indexOf(_normalize(name)) >= 0 ||
             _normalize(name).indexOf(_normalize(e.name)) >= 0;
    });

    // Build sets array pre-filled with trainer's prescribed values
    var setsArr = [];
    for (var i = 0; i < sets; i++) {
      setsArr.push({
        w: weight,   // pre-fill weight
        r: reps,     // pre-fill reps
        rpe: rpe     // pre-fill RPE target
      });
    }

    exercises.push({
      id:       libEx ? libEx.id       : 'routine-' + Date.now() + '-' + Math.random(),
      name:     libEx ? libEx.name     : name,
      icon:     libEx ? libEx.icon     : '💪',
      category: libEx ? libEx.category : '',
      sets:     setsArr,
      // Extra metadata from routine
      prescribed: { sets: sets, reps: reps, weight: weight, rpe: rpe }
    });
  });

  if (!exercises.length) {
    // Fallback: just switch to log tab if we couldn't parse
    set({ tab: 'log' });
    toast('Abre el tab HOY para registrar tu entrenamiento');
    return;
  }

  // Load into session — first exercise expanded
  var firstId = exercises[0].id;
  set({
    session:  exercises,
    expanded: firstId,
    tab:      'log',
    date:     new Date().toISOString().slice(0, 10),
    sessionNote: '',
    sessionTags: []
  });

  toast('✅ ' + exercises.length + ' ejercicio' + (exercises.length > 1 ? 's' : '') + ' cargados de tu rutina');
}


// Add exercise with pre-filled values from routine prescription
function addExToSessionWithValues(id, sets, reps, weight, rpe) {
  var ex = STATE.exercises.find(function(e){ return e.id===id; });
  if (!ex) { addExToSession(id); return; }
  if (STATE.session.find(function(s){ return s.id===id; })) {
    toast('Ya está en el entrenamiento', 'err'); return;
  }
  var setsArr = [];
  var n = parseInt(sets) || 3;
  for (var i = 0; i < n; i++) {
    setsArr.push({ w: weight || '', r: reps || '', rpe: rpe || '' });
  }
  var ns = STATE.session.concat([{
    id: ex.id, name: ex.name, icon: ex.icon, category: ex.category || '',
    sets: setsArr
  }]);
  set({ session: ns, expanded: ex.id, tab: 'log' });
  toast(ex.name + ' agregado con valores de tu rutina 💪');
}

async function submitAuth() {
  var f = STATE.form;
  set({error:''});

  // ── Validaciones frontend ──────────────────────────
  var email = (f.email||'').trim();
  var pass  = (f.pass||'').trim();
  var name  = (f.name||'').trim();

  if (!email || !email.includes('@') || !email.includes('.')) {
    set({error:'Ingresa un email válido'}); return;
  }
  if (pass.length < 6) {
    set({error:'La contraseña debe tener al menos 6 caracteres'}); return;
  }
  if (STATE.authMode === 'register' && !name) {
    set({error:'Ingresa tu nombre completo'}); return;
  }
  if (STATE.authMode === 'register' && name.length < 2) {
    set({error:'El nombre debe tener al menos 2 caracteres'}); return;
  }

  set({saving:true});

  if (STATE.authMode === 'login') {
    var r = await SB.auth.signInWithPassword({email:email, password:pass});
    if (r.error) { set({error:friendlyError(r.error.message), saving:false}); return; }
    try { localStorage.setItem('vitawell-email', email); } catch(e) {}
    set({error:'', saving:false}); // ← clear before loading
    await loadProfile(r.data.user);
  } else {
    var r2 = await SB.auth.signUp({
      email: email,
      password: pass,
      options: { data: { role: f.role, full_name: name } }
    });
    if (r2.error) { set({error:r2.error.message, saving:false}); return; }
    var authUser = r2.data && r2.data.user ? r2.data.user : null;
    if (!authUser) {
      var r3 = await SB.auth.signInWithPassword({email:email, password:pass});
      if (r3.error) { set({error:r3.error.message, saving:false}); return; }
      authUser = r3.data.user;
    }
    if (authUser) {
      var existing = await SB.from('profiles').select('id').eq('id', authUser.id).single();
      if (!existing.data) {
        var insertR = await SB.from('profiles').insert({
          id:authUser.id, full_name:name, email:email, role:f.role,
          sex:null, age:null, height_cm:null, weight_kg:null, goal:null, level:null
        });
        // Don't block on insert error — RLS may cause false failures
        // The profile might have been created by a DB trigger
        if (insertR.error) {
          console.warn('Profile insert warning:', insertR.error.message);
          // Try update instead (profile might exist from trigger)
          await SB.from('profiles').update({full_name:name, role:f.role}).eq('id', authUser.id);
        }
      } else {
        await SB.from('profiles').update({full_name:name, role:f.role}).eq('id', authUser.id);
      }
      set({error:'', saving:false}); // ← clear errors before loadProfile
      await loadProfile(authUser);
    }
  }
  set({saving:false});
}

    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(10,14,20,0.85);display:flex;align-items:center;justify-content:center;animation:fadeUp .3s ease';
    overlay.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:16px">'

      +'<div style="font-family:Nunito,sans-serif;font-size:18px;font-weight:800;color:#E8F4F8">¡Sesión guardada!</div>'

// ══════════════════════════════════════════════════════════════════
// TRAINER MODULE — Input-focus-safe, full feedback dashboard
// Key principle: inputs NEVER trigger render() — only STATE mutation
// DOM is patched directly for live updates
// ══════════════════════════════════════════════════════════════════

// ── Trainer state manager ─────────────────────────────────────────
var TR = {
  // Input buffer — holds values between renders to restore focus
  _buf: {},
  get: function(k) { return this._buf[k] !== undefined ? this._buf[k] : ''; },
  set: function(k, v) { this._buf[k] = v; }
};

// Safe input updater — never re-renders
function trInput(field, val) {
  TR.set(field, val);
  if (field === 'invite') STATE.invite = val;
  if (field === 'rb-name' && STATE.rb) STATE.rb.name = val;
  if (field === 'trainer-note' && STATE.selectedClient) {
    TR.set('note-' + STATE.selectedClient.id, val);
  }
}

// ── Load all clients (own + unassigned pool) ──────────────────────
async function loadAllClients() {
  // Own clients
  var r1 = await SB.from('profiles')
    .select('*')
    .eq('trainer_id', STATE.user.id);

  // All unlinked clients (no trainer assigned yet) — for discovery
  var r2 = await SB.from('profiles')
    .select('id, full_name, email, role, last_session')
    .eq('role', 'client')
    .is('trainer_id', null)
    .limit(50);

  var now = new Date();
  var todayStr = now.toISOString().slice(0,10);
  var yStr = new Date(now.getTime() - 86400000).toISOString().slice(0,10);

  var mine = (r1.data || []);
  var pool = (r2.data || []).filter(function(p) {
    return !mine.find(function(m) { return m.id === p.id; });
  });

  // Get last session for own clients
  if (mine.length) {
    var sessR = await SB.from('workout_sessions')
      .select('client_id, date')
      .in('client_id', mine.map(function(c) { return c.id; }))
      .order('date', {ascending:false});
    var lastMap = {};
    (sessR.data||[]).forEach(function(s) {
      if (!lastMap[s.client_id]) lastMap[s.client_id] = s.date;
    });
    mine = mine.map(function(c) {
      return Object.assign({}, c, {last_session: lastMap[c.id]||null});
    });
  }

  STATE.clients = mine;
  STATE.clientPool = pool;
  set({clients: mine});
}

async function openClient(id) {
  var cl2 = STATE.clients.find(function(x) { return x.id === id; });
  if (!cl2) return;
  set({selectedClient: Object.assign({}, cl2, {sessions:[], loading:true}),
       clientDetailTab: 'history', sessionAdjust: {}});
  var r = await SB.from('workout_sessions')
    .select('*, session_sets(*)')
    .eq('client_id', id)
    .order('date', {ascending:false});
  var sessions = r.data || [];
  set({selectedClient: Object.assign({}, cl2, {sessions: sessions, loading:false})});
  // Restore any buffered note
  var buffered = TR.get('note-' + id);
  if (!buffered && cl2.trainer_note) TR.set('note-' + id, cl2.trainer_note);
}

async function linkClient(clientId) {
  var upd = await SB.from('profiles')
    .update({trainer_id: STATE.user.id})
    .eq('id', clientId)
    .select();

  if (upd.error || !upd.data || !upd.data.length) {

    toast('Error al vincular: ' + msg, 'err');

  toast('Cliente vinculado ✅');

}

async function inviteClient() {
  var email = (STATE.invite || '').trim();
  if (!email) { toast('Ingresa un email', 'err'); return; }
  if (!email.includes('@')) { toast('Email inválido', 'err'); return; }

  set({saving: true});
  toast('Buscando...');

  // Find client by email
  var r = await SB.from('profiles').select('*').eq('email', email).eq('role','client').single();

  if (!r.data) {
    set({saving: false});
    toast('No se encontró un cliente con ese email. Debe registrarse primero en Vitawell.', 'err');
    return;
  }

  var client = r.data;

  if (client.trainer_id === STATE.user.id) {
    set({saving: false});
    toast(client.full_name + ' ya es tu cliente', 'err');
    return;
  }

  if (client.trainer_id && client.trainer_id !== STATE.user.id) {
    set({saving: false});
    toast(client.full_name + ' ya tiene otro entrenador asignado', 'err');
    return;
  }

  // Perform the link
  var upd = await SB.from('profiles')
    .update({trainer_id: STATE.user.id})
    .eq('id', client.id)
    .select();  // .select() forces Supabase to return the updated row

  if (upd.error) {
    set({saving: false});
    console.error('Link error:', upd.error);
    toast('Error al vincular: ' + friendlyError(upd.error.message), 'err');
    return;
  }

  // Verify the update actually happened
  if (!upd.data || !upd.data.length) {
    set({saving: false});
    toast('No se pudo vincular. Verifica los permisos en Supabase (ejecuta fix_linking_rls.sql)', 'err');
    return;
  }

  // Success — refresh client list
  STATE.invite = '';
  set({saving: false});
  await loadAllClients();
  set({trainerTab: 'clients'});
  toast('✅ ' + client.full_name + ' vinculado a tu perfil 🎉');
}

async function saveTrainerNote(clientId) {

}

// ── Client list renderer (no full re-render on search) ─────────────
function _renderClientList() {
  var mount = document.getElementById('client-list-mount');
  if (!mount) return;
  var s = STATE;
  var now = new Date();
  var todayStr = now.toISOString().slice(0,10);
  var yStr = new Date(now.getTime()-86400000).toISOString().slice(0,10);
  var q = (s.clientSearch||'').toLowerCase().trim();
  var filter = s.clientFilter || 'all';

  var list = s.clients.filter(function(cl) {
    if (q && _normalize(cl.full_name).indexOf(_normalize(q))<0 && (cl.email||'').toLowerCase().indexOf(q)<0) return false;
    if (filter==='mine' && cl.trainer_id !== s.user.id) return false;
    if (filter==='active') { var l=cl.last_session; return l===todayStr||l===yStr; }
    if (filter==='inactive') return !cl.last_session||(now-new Date(cl.last_session))>7*86400000;
    return true;
  });

  if (!list.length) {
    mount.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#4a6480"><div style="font-size:40px;margin-bottom:12px">👥</div><div style="font-size:15px;font-weight:700">' + (q?'Sin resultados para "'+q+'"':'Sin clientes') + '</div></div>';
    return;
  }

  var html = '<div style="display:flex;flex-direction:column;gap:8px">';
  list.forEach(function(cl) {
    var ld = cl.last_session;
    var isAct = ld===todayStr||ld===yStr;
    var ds = ld ? Math.floor((now-new Date(ld))/86400000) : null;
    var sCol = isAct?'#4ade80':ds===null?'#4a6480':ds<=7?'#f59e0b':'#ef4444';
    var sLbl = isAct?'Activo':ds===null?'Sin sesiones':ds===0?'Hoy':ds+'d';
    var init = (cl.full_name||'?')[0].toUpperCase();
    var isMine = cl.trainer_id === s.user.id;

    html += '<div onclick="openClient(\'' + cl.id + '\')" '
      + 'style="background:#0f1e35;border:1px solid #1e3560;border-radius:16px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .18s" '
      + 'onmouseover="this.style.borderColor=\'#00c9a7\'" onmouseout="this.style.borderColor=\'#1e3560\'">'
      // Avatar
      + '<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#00c9a733,#a8e63d33);border:2px solid '+(isMine?'#00c9a744':'#1e3560')+';display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#00c9a7;flex-shrink:0">' + init + '</div>'
      // Info
      + '<div style="flex:1;min-width:0">'
        + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">'
          + '<div style="font-size:14px;font-weight:800">' + cl.full_name + '</div>'
          + (isMine?'<div style="font-size:9px;background:#00c9a722;color:#00c9a7;border-radius:20px;padding:2px 7px;font-weight:800">🔗</div>':'')
        + '</div>'
        + '<div style="font-size:11px;color:#4a6480">' + cl.email + '</div>'
      + '</div>'
      // Status
      + '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">'
        + '<div style="display:flex;align-items:center;gap:5px">'
          + '<div style="width:7px;height:7px;border-radius:50%;background:' + sCol + (isAct?';box-shadow:0 0 6px '+sCol:'') + '"></div>'
          + '<div style="font-size:11px;color:' + sCol + ';font-weight:700">' + sLbl + '</div>'
        + '</div>'
        + (ld?'<div style="font-size:10px;color:#4a6480">' + ld + '</div>':'')
        + '<div style="font-size:10px;color:#4a6480">' + (cl.level||'—') + '</div>'
      + '</div>'
      + '<div style="color:#4a6480;font-size:16px">›</div>'

  });
  html += '</div>';
  mount.innerHTML = html;

// ── Assign client to trainer ────────────────────────────────────────
async function unlinkClient(clientId) {
  if (!confirm('¿Desvincular este cliente de tu perfil?\nEl cliente seguirá en la app pero ya no aparecerá en tu lista.')) return;
  var r = await SB.from('profiles').update({trainer_id: null}).eq('id', clientId);
  if (r.error) { toast(friendlyError(r.error.message), 'err'); return; }
  STATE.clients = STATE.clients.map(function(cl) {
    return cl.id === clientId ? Object.assign({}, cl, {trainer_id: null}) : cl;
  });
  set({selectedClient: null});
  toast('Cliente desvinculado ✅');
}

async function deleteClientProfile(clientId) {
  var clData = STATE.clients.find(function(x){ return x.id === clientId; });
  var clientName = clData ? clData.full_name : 'este cliente';

  var confirmMsg = '⚠️ ELIMINAR PERMANENTEMENTE\n\n'
    + 'Cliente: ' + clientName + '\n\n'
    + 'Se eliminará:\n'
    + '• Su perfil completo\n'
    + '• Todas sus sesiones y series\n'
    + '• Sus rutinas asignadas\n'
    + '• Su cuenta de acceso\n\n'
    + '¿Confirmar? No se puede deshacer.';

  if (!confirm(confirmMsg)) return;
  if (!confirm('Última confirmación: eliminar a ' + clientName + ' permanentemente.')) return;

  toast('Eliminando...');

  try {
    // Use RPC function that runs with admin privileges
    var r = await SB.rpc('delete_user_complete', { target_user_id: clientId });

    if (r.error) {
      // RPC failed — fallback to manual cascade delete (profile only, not auth)
      console.warn('RPC failed, doing manual delete:', r.error.message);

      var sessR = await SB.from('workout_sessions').select('id').eq('client_id', clientId);
      var sessIds = (sessR.data || []).map(function(s){ return s.id; });
      if (sessIds.length) {
        await SB.from('session_sets').delete().in('session_id', sessIds);
        await SB.from('workout_sessions').delete().eq('client_id', clientId);
      }
      await SB.from('routines').delete().eq('client_id', clientId);
      var rp = await SB.from('profiles').delete().eq('id', clientId);
      if (rp.error) throw new Error(rp.error.message);
    }

    // Update local state
    STATE.clients = STATE.clients.filter(function(cl){ return cl.id !== clientId; });
    STATE.clientPool = (STATE.clientPool||[]).filter(function(cl){ return cl.id !== clientId; });
    set({ selectedClient: null, trainerTab: 'manage' });
    toast(clientName + ' eliminado 🗑️');

  } catch(e) {
    console.error('deleteClientProfile error:', e);
    toast(friendlyError(e.message), 'err');
  }
}

async function assignClient(clientId) {
  var upd = await SB.from('profiles')
    .update({trainer_id: STATE.user.id})
    .eq('id', clientId)
    .select();
  if (upd.error || !upd.data || !upd.data.length) {
    var msg = upd.error ? friendlyError(upd.error.message) : 'Sin permisos RLS. Ejecuta fix_linking_rls.sql';
    toast('Error: ' + msg, 'err'); return;
  }
  STATE.clients = STATE.clients.map(function(c){
    return c.id===clientId ? Object.assign({},c,{trainer_id:STATE.user.id}) : c;
  });
  if (STATE.selectedClient && STATE.selectedClient.id===clientId) {
    STATE.selectedClient = Object.assign({},STATE.selectedClient,{trainer_id:STATE.user.id});
  }
  toast('Cliente asignado ✅');
  render();
}

// ── Save trainer feedback response ─────────────────────────────────
async function saveTrainerFeedback(sessionId, loadAdjustment) {
  var ta = document.getElementById('tr-resp-'+sessionId);
  var response = ta ? ta.value.trim() : '';
  var cl = STATE.selectedClient;
  if (!cl) return;

  // Check if feedback record exists
  var existing = (cl.feedbacks||[]).find(function(f){ return f.session_id===sessionId; });

  var payload = {
    session_id:        sessionId,
    client_id:         cl.id,
    trainer_id:        STATE.user.id,
    trainer_response:  response,
    load_adjustment:   loadAdjustment,
    responded_at:      new Date().toISOString()
  };

  var r;
  if (existing) {
    r = await SB.from('session_feedback').update(payload).eq('id', existing.id);
  } else {
    r = await SB.from('session_feedback').insert(payload);
  }

  if (r.error) { toast('Error: '+r.error.message,'err'); return; }

  var adjLabels = {increase:'Carga ⬆ aumentada',maintain:'Carga ↔ mantenida',decrease:'Carga ⬇ reducida',deload:'🔴 Deload programado'};
  toast(adjLabels[loadAdjustment]||'Feedback guardado ✅');

  // Update selected client sessions in STATE
  STATE.selectedClient.sessions = STATE.selectedClient.sessions.map(function(sx){
    if (sx.id!==sessionId) return sx;
    return Object.assign({},sx,{feedback:Object.assign({},sx.feedback||{},payload)});
  });
  render();
}

function calcIEE(sets) {
  var valid = sets.filter(function(s){ return s.w && s.r && s.rpe; });
  if (!valid.length) return null;
  var vol = valid.reduce(function(a,s){ return a+(+s.w)*(+s.r); },0);
  var rpeAvg = valid.reduce(function(a,s){ return a+(+s.rpe); },0) / valid.length;
  var maxW = Math.max.apply(null, valid.map(function(s){ return +s.w; }));
  var iee = Math.round((vol / rpeAvg) * 10) / 10;
  return { iee:iee, vol:vol, rpeAvg:Math.round(rpeAvg*10)/10, maxW:maxW };
}

function classifySession(sets, historyData) {
  var curr = calcIEE(sets);
  if (!curr) return null;
  var rpe = curr.rpeAvg;
  var prevMaxW = historyData.length ? historyData[historyData.length-1].peso : 0;
  var currMaxW = curr.maxW;
  var status, badge, msg, color, suggestion;
  if (rpe <= 6) {
    if (currMaxW > prevMaxW) {
      status='FUERZA EN PROGRESO'; badge='🚀'; color='#4ade80';
      msg='Subiste peso con RPE bajo — tu sistema nervioso está fresco y adaptado.';
      suggestion='Próxima sesión: +2.5kg manteniendo este RPE.';
    } else {
      status='SESIÓN TÉCNICA'; badge='⚙️'; color=C.aqua;
      msg='Esfuerzo bajo con peso estable — sesión de calidad técnica.';
      suggestion='Considera subir el peso la próxima vez.';
    }
  } else if (rpe <= 8) {
    if (currMaxW > prevMaxW) {
      status='ESFUERZO EFECTIVO'; badge='✅'; color=C.aqua;
      msg='Zona óptima de entrenamiento — esfuerzo moderado con progresión de carga.';
      suggestion='Mantén esta tendencia. Recuperación normal de 48-72h.';
    } else {
      status='MANTENIMIENTO'; badge='🔄'; color=C.lime;
      msg='Buen esfuerzo pero sin progresión de carga esta sesión.';
      suggestion='Normal cada 2-3 semanas. Si persiste, ajusta el programa.';
    }
  } else {
    if (currMaxW > prevMaxW) {
      status='MÁXIMO ESFUERZO'; badge='💥'; color='#f59e0b';
      msg='Subiste peso al límite de tu capacidad actual.';
      suggestion='Excelente PR. La próxima sesión reduce volumen 20%.';
    } else if (currMaxW >= prevMaxW) {
      status='ALERTA: ESTANCAMIENTO'; badge='⚠️'; color='#f97316';
      msg='RPE máximo sin progresión — señal de fatiga acumulada.';
      suggestion='🔴 Recomendado: semana de descarga (Deload). Reduce peso 40%.';
    } else {
      status='DELOAD URGENTE'; badge='🔴'; color='#ef4444';
      msg='Esfuerzo máximo con caída de rendimiento — sobreentrenamiento detectado.';
      suggestion='🛑 Para 1-2 semanas de deload completo.';
    }
  }
  var ieeScore = Math.min(100, Math.round((curr.iee/500)*100));
  return { status:status, badge:badge, color:color, msg:msg, suggestion:suggestion,
           iee:curr.iee, ieeScore:ieeScore, rpeAvg:curr.rpeAvg, vol:curr.vol, maxW:curr.maxW };
}

async function submitReset() {
  var email = (STATE.form.email || '').trim();
  if (!email || !email.includes('@')) { set({error:'Ingresa un email válido'}); return; }
  set({saving:true, error:''});
  // redirectTo: Supabase will append #access_token=...&type=recovery to this URL
  var resetRedirect = window.location.hostname === 'vitawell.fit'
    ? 'https://vitawell.fit'
    : window.location.origin;
  var r = await SB.auth.resetPasswordForEmail(email, {
    redirectTo: resetRedirect
  });
  set({saving:false});
  if (r.error) { set({error:r.error.message}); }
  else { set({resetSent:true, error:''}); }
}



async function submitNewPassword() {
  var pass  = (STATE.form.newPass  || '').trim();
  var pass2 = (STATE.form.newPass2 || '').trim();
  if (pass.length < 6) {
    set({error:'La contraseña debe tener al menos 6 caracteres'}); return;
  }
  if (pass !== pass2) {
    set({error:'Las contraseñas no coinciden'}); return;
  }
  set({saving:true, error:''});
  var r = await SB.auth.updateUser({password: pass});
  set({saving:false});
  if (r.error) {
    set({error: friendlyError(r.error.message)}); return;
  }
  // Success — clear form and go to login
  toast('Contraseña actualizada ✅ Inicia sesión');
  set({authMode:'login', error:'', form:{name:'',email:'',pass:'',role:'client'}, newPass:'', newPass2:''});
  await SB.auth.signOut();
}

function removeEx(id) {
  set({session: STATE.session.filter(function(e){ return e.id!==id; }),
       expanded: STATE.expanded===id ? null : STATE.expanded});
}

function updSet(exId, idx, field, val) {
  // Sanitize: replace comma with dot for decimals
  if (field === 'w' || field === 'r') val = String(val).replace(',', '.');
  // Clamp RPE
  if (field === 'rpe' && val !== '') val = Math.min(10, Math.max(1, +val));
  STATE.session = STATE.session.map(function(e) {
    if (e.id !== exId) return e;
    return Object.assign({}, e, {sets: e.sets.map(function(s, i) {
      if (i !== idx) return s;
      return Object.assign({}, s, (function(){ var o={}; o[field]=val; return o; })());
    })});
  });
  if (field === 'rpe') {
    var ex = STATE.session.find(function(e){ return e.id===exId; });
    if (ex) _updateIEE(exId, ex);
  }
}

function addSet(exId) {
  set({session: STATE.session.map(function(e) {
    if (e.id !== exId) return e;
    return Object.assign({}, e, {sets: e.sets.concat([{w:'',r:''}])});
  })});
}

function remSet(exId, idx) {
  set({session: STATE.session.map(function(e) {
    if (e.id !== exId) return e;
    return Object.assign({}, e, {sets: e.sets.filter(function(_,i){ return i!==idx; })});
  })});
}

function addExToSession(id) {
  var ex = STATE.exercises.find(function(e){ return e.id===id; });
  if (!ex) return;
  if (STATE.session.find(function(s){ return s.id===id; })) { toast('Ya está en el entrenamiento','err'); return; }
  var ns = STATE.session.concat([{id:ex.id,name:ex.name,icon:ex.icon,category:ex.category||'',sets:[{w:'',r:''}]}]);
  set({session:ns, expanded:id, tab:'log'});
}

async function deleteSession(id) {
  if (!confirm('¿Eliminar esta sesión? Esta acción no se puede deshacer.')) return;
  var r = await SB.from('session_sets').delete().eq('session_id', id);
  var r2 = await SB.from('workout_sessions').delete().eq('id', id);
  if (r2.error) { toast('Error eliminando sesión','err'); return; }
  set({sessions: STATE.sessions.filter(function(s){ return s.id!==id; })});
  toast('Sesión eliminada');
}

function toggleSessionNote(sessionId) {
  var editor = document.getElementById('note-editor-'+sessionId);
  var display = document.getElementById('note-display-'+sessionId);
  if (!editor) return;
  var isHidden = editor.style.display === 'none' || editor.style.display === '';
  editor.style.display = isHidden ? 'block' : 'none';
}

async function saveNote(sessionId) {
  var ta = document.getElementById('note-ta-'+sessionId);
  if (!ta) return;
  var note = ta.value.trim();
  var r = await SB.from('workout_sessions').update({notes: note||null}).eq('id', sessionId);
  if (r.error) { toast('Error guardando nota','err'); return; }
  // Update local state
  STATE.sessions = STATE.sessions.map(function(s) {
    return s.id===sessionId ? Object.assign({},s,{notes:note}) : s;
  });
  toggleSessionNote(sessionId);
  toast('Nota guardada ✅');
  render();
}

function drawSparkline(canvasId, data, key, color) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !data || data.length < 2) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.offsetWidth || 400;
  canvas.width = W; canvas.height = 80;
  var H = 80, pad = {t:8,r:12,b:24,l:8};
  var vals = data.map(function(d){ return d[key]; });
  var minV = Math.min.apply(null,vals), maxV = Math.max.apply(null,vals);
  var range = (maxV-minV)||1;
  var tx = function(i){ return pad.l+(i/Math.max(data.length-1,1))*(W-pad.l-pad.r); };
  var ty = function(v){ return pad.t+(1-(v-minV)/range)*(H-pad.t-pad.b); };
  ctx.clearRect(0,0,W,H);
  var grad = ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,color+'40'); grad.addColorStop(1,color+'00');
  ctx.beginPath(); ctx.moveTo(tx(0),H-pad.b);
  data.forEach(function(d,i){ ctx.lineTo(tx(i),ty(d[key])); });
  ctx.lineTo(tx(data.length-1),H-pad.b); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2;
  ctx.lineJoin='round'; ctx.lineCap='round';
  data.forEach(function(d,i){ if(i===0)ctx.moveTo(tx(i),ty(d[key])); else ctx.lineTo(tx(i),ty(d[key])); });
  ctx.stroke();
  [0,data.length-1].forEach(function(i){
    var d=data[i];
    ctx.beginPath(); ctx.arc(tx(i),ty(d[key]),4,0,Math.PI*2);
    ctx.fillStyle=C.card; ctx.fill(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle=color; ctx.font='bold 10px Nunito,sans-serif';
    ctx.textAlign=i===0?'left':'right';
    ctx.fillText(d[key]+'kg',tx(i)+(i===0?6:-6),ty(d[key])-6);
  });
  ctx.fillStyle=C.muted; ctx.font='9px Nunito,sans-serif';
  [0,data.length-1].forEach(function(i){
    ctx.textAlign=i===0?'left':'right';
    ctx.fillText((data[i].date||'').slice(5),tx(i)+(i===0?2:-2),H-4);
  });
}

  if(!added){render();return;}
  set({session:newSession, expanded:lastId, tab:'log', view:'client'});
  toast(added===1?'Ejercicio agregado 💪':added+' ejercicios agregados 💪');
}

function _wmGetFiltered() {
  var exs=STATE.exercises.slice();
  var chip=WM.chip;
  if(chip){
    if(WM.filter==='MÚSCULOS'){
      var cn=_normalize(chip);
      exs=exs.filter(function(e){return _normalize(e.category)===cn;});
    } else {
      var mapped=WM_CAT_MAP[chip];
      if(mapped){var kw=_normalize(mapped);exs=exs.filter(function(e){return _normalize(e.name).indexOf(kw)>=0;});}
    }
  }
  var q=_normalize(WM.search||'');
  if(q) exs=exs.filter(function(e){return _normalize(e.name).indexOf(q)>=0||_normalize(e.category).indexOf(q)>=0;});
  return exs;
}
